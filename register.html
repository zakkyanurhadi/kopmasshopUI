<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kopmas Shop - Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', ui-sans-serif, system-ui; }
    #navbar-wrapper { background: rgba(255,255,255,.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.2); transition: all .3s ease; }
    #navbar-wrapper.scrolled { background: rgba(255,255,255,.85); box-shadow: 0 8px 32px rgba(0,0,0,.1); }
    .navbar-secondary { max-height: 50px; overflow: hidden; transition: max-height .35s ease, opacity .3s ease, margin .35s ease, padding .35s ease; opacity: 1; }
    .navbar-secondary.sec-hidden { max-height: 0; opacity: 0; padding-bottom: 0 !important; margin-bottom: -8px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div data-shared-header></div>
  <div class="h-32 lg:h-40"></div>
  <main class="container mx-auto px-6 py-10">
    <section class="mx-auto max-w-3xl rounded-3xl border border-slate-200 bg-white p-6 shadow-sm md:p-10">
      <img src="./assets/images/logos/logokopmas.png" alt="Kopmas" class="mx-auto h-9">
      <div class="mt-8 space-y-2 text-center">
        <h1 class="text-2xl font-extrabold">Hey 🙌🏻, Welcome Aboard!</h1>
        <p class="text-sm text-slate-500">Create account to continue.</p>
      </div>

      <form class="mt-8 space-y-4">
        <div class="grid gap-4 md:grid-cols-2">
          <label class="block">
            <span class="mb-2 block text-sm font-semibold text-slate-600">Complete Name</span>
            <input type="text" placeholder="Enter your full name" class="h-12 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500">
          </label>
          <label class="block">
            <span class="mb-2 block text-sm font-semibold text-slate-600">Email Address</span>
            <input type="email" placeholder="Enter your email" class="h-12 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500">
          </label>
        </div>
        <label class="block">
          <span class="mb-2 block text-sm font-semibold text-slate-600">Password</span>
          <input type="password" placeholder="Create password" class="h-12 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500">
        </label>
        <div>
          <p class="mb-2 text-sm font-semibold text-slate-600">Account Type</p>
          <div class="grid gap-3 md:grid-cols-2">
            <label class="flex h-12 items-center gap-2 rounded-xl border border-slate-200 px-4 text-sm font-semibold"><input type="radio" name="role"> Seller</label>
            <label class="flex h-12 items-center gap-2 rounded-xl border border-slate-200 px-4 text-sm font-semibold"><input type="radio" name="role"> Buyer</label>
          </div>
        </div>
        <button type="submit" class="h-12 w-full rounded-xl bg-blue-600 text-sm font-bold text-white hover:bg-blue-700">Create Account</button>
      </form>

      <p class="mt-5 text-center text-sm text-slate-500">Sudah punya akun? <a href="login.html" class="font-semibold text-blue-600">Sign In</a></p>
    </section>
  </main>
  <div data-shared-footer></div>
  <script src="./layout-shared.js" defer></script>
</body>
</html>
