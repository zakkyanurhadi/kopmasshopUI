<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cari Produk - Blue Kopmas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./assets/css/skeleton.css">
  <link rel="stylesheet" href="./assets/main.css">
  <script defer src="./assets/js/gsap-skeleton.js"></script>

  <style>
    :root {
      /* Ubah nilai ini untuk atur padding kanan-kiri secara manual */
      --page-side-padding-mobile-min: 20px;
      --page-side-padding-fluid: 5vw;
      --page-side-padding-desktop: 160px;
    }

    body .px-55 {
      padding-left: clamp(
        var(--page-side-padding-mobile-min),
        var(--page-side-padding-fluid),
        var(--page-side-padding-desktop)
      ) !important;
      padding-right: clamp(
        var(--page-side-padding-mobile-min),
        var(--page-side-padding-fluid),
        var(--page-side-padding-desktop)
      ) !important;
    }

    @media (min-width: 1280px) {
      body .px-55 {
        padding-left: var(--page-side-padding-desktop) !important;
        padding-right: var(--page-side-padding-desktop) !important;
      }
    }
  </style>
</head>
<body class="bg-slate-50">

  <!-- Header -->
  <header id="header" class="sticky top-0 z-40 bg-white border-b border-slate-100"></header>

  <!-- Search Page Container -->
  <main class="px-55 py-6 md:py-8">

    <!-- Search Bar Section -->
    <section class="mb-8">
      <div class="flex items-center gap-3 mb-6">
        <a href="javascript:history.back()" class="flex h-10 w-10 items-center justify-center rounded-full hover:bg-slate-100 transition">
          <i class="fas fa-chevron-left text-xl text-slate-700"></i>
        </a>
        <div class="flex-1 relative">
          <input
            type="text"
            id="searchInput"
            placeholder="Cari lebih banyak di Terjadwal..."
            class="w-full h-11 px-4 rounded-full border-2 border-slate-300 focus:border-blue-500 focus:outline-none text-sm placeholder-slate-400"
          >
          <button id="searchButton" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </div>
    </section>

    <!-- Search History -->
    <section id="historySection" class="mb-8">
      <div class="mb-4 flex items-center justify-between gap-3">
        <div class="flex items-center gap-2">
          <i class="fas fa-clock-rotate-left text-slate-600"></i>
          <h2 class="text-lg font-extrabold text-slate-800">Histori Pencarian</h2>
        </div>
        <button id="clearHistoryButton" class="text-xs font-semibold text-slate-500 hover:text-red-500 transition">Hapus semua</button>
      </div>
      <div id="historyChips" class="flex flex-wrap gap-2"></div>
      <p id="historyEmpty" class="text-sm text-slate-500">Belum ada histori pencarian.</p>
    </section>

    <!-- Recommended Products -->
    <section id="recommendationsSection" class="mb-10">
      <div class="mb-4 flex items-center gap-2">
        <i class="fas fa-thumbs-up text-blue-600"></i>
        <h2 class="text-lg font-extrabold text-slate-800">Produk Rekomendasi</h2>
      </div>
      <div id="recommendationsGrid" class="grid gap-4 grid-cols-2 lg:grid-cols-4"></div>
    </section>

    <!-- Popular Search Suggestions (shown when no search results) -->
    <section id="suggestionsSection" class="mb-10">
      <div class="flex items-center gap-2 mb-4">
        <i class="fas fa-fire text-red-500 text-lg"></i>
        <h2 class="text-lg font-extrabold text-slate-800">Sering Dicari Orang Lain</h2>
      </div>
      <div class="grid gap-3 grid-cols-2 sm:grid-cols-3 lg:grid-cols-4">
        <button class="px-4 py-2.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 hover:border-blue-500 hover:text-blue-600 transition suggestion-chip">Ayam Sayurbox</button>
        <button class="px-4 py-2.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 hover:border-blue-500 hover:text-blue-600 transition suggestion-chip">Paket Masak</button>
        <button class="px-4 py-2.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 hover:border-blue-500 hover:text-blue-600 transition suggestion-chip">Daging Sapi dan Kambing</button>
        <button class="px-4 py-2.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 hover:border-blue-500 hover:text-blue-600 transition suggestion-chip">Susu dan Biskuit</button>
        <button class="px-4 py-2.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 hover:border-blue-500 hover:text-blue-600 transition suggestion-chip">Aneka Pasta</button>
        <button class="px-4 py-2.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 hover:border-blue-500 hover:text-blue-600 transition suggestion-chip">Vitamin</button>
        <button class="px-4 py-2.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 hover:border-blue-500 hover:text-blue-600 transition suggestion-chip">Bundle Hemat</button>
        <button class="px-4 py-2.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 hover:border-blue-500 hover:text-blue-600 transition suggestion-chip">Tahu dan Telur</button>
        <button class="px-4 py-2.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 hover:border-blue-500 hover:text-blue-600 transition suggestion-chip">MPASI</button>
        <button class="px-4 py-2.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 hover:border-blue-500 hover:text-blue-600 transition suggestion-chip">Ikan dan Kerang</button>
      </div>
    </section>

    <!-- Search Results (hidden until user searches) -->
    <section id="resultsSection" class="hidden">
      <div class="mb-6">
        <h2 class="text-lg font-extrabold text-slate-800 mb-2">Hasil Pencarian</h2>
        <p class="text-sm text-slate-500">Menampilkan hasil untuk "<span id="searchQuery"></span>"</p>
      </div>

      <!-- Results Grid -->
      <div id="resultsGrid" class="grid gap-4 grid-cols-2 lg:grid-cols-4">
        <!-- Result items will be generated here -->
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer id="footer" class="mt-12 bg-white border-t border-slate-100"></footer>

  <!-- Mobile Bottom Navigation -->
  <nav id="mobileNav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 sm:hidden"></nav>

  <script src="./layout-shared.js"></script>
  <script>
    // Mock product data for demo
    const mockProducts = [
      {
        id: 1,
        name: "iPhone 15 Pro",
        price: "Rp 18.999.000",
        rating: 4.9,
        image: "./assets/images/thumbnails/iphone-2.png",
        store: "Blue Gadget Center",
        location: "Sleman"
      },
      {
        id: 2,
        name: "Samsung S Ultra",
        price: "Rp 21.500.000",
        rating: 4.7,
        image: "./assets/images/thumbnails/ip-blue.png",
        store: "Tech Store Premium",
        location: "Jakarta"
      },
      {
        id: 3,
        name: "Xiaomi Ultra 14",
        price: "Rp 10.200.000",
        rating: 4.6,
        image: "./assets/images/thumbnails/ip-green.png",
        store: "Mobile Center",
        location: "Bandung"
      },
      {
        id: 4,
        name: "Google Pixel 8",
        price: "Rp 12.999.000",
        rating: 4.8,
        image: "./assets/images/thumbnails/ip-white.png",
        store: "Digital Store",
        location: "Surabaya"
      }
    ];

    const searchInput = document.getElementById('searchInput');
    const searchButton = document.getElementById('searchButton');
    const suggestionsSection = document.getElementById('suggestionsSection');
    const resultsSection = document.getElementById('resultsSection');
    const resultsGrid = document.getElementById('resultsGrid');
    const searchQuery = document.getElementById('searchQuery');
    const suggestionChips = document.querySelectorAll('.suggestion-chip');
    const recommendationsGrid = document.getElementById('recommendationsGrid');
    const historyChips = document.getElementById('historyChips');
    const historyEmpty = document.getElementById('historyEmpty');
    const clearHistoryButton = document.getElementById('clearHistoryButton');

    const SEARCH_HISTORY_KEY = 'kopmas_search_history';
    const MAX_SEARCH_HISTORY = 8;

    function getSearchHistory() {
      try {
        const rawData = localStorage.getItem(SEARCH_HISTORY_KEY);
        return rawData ? JSON.parse(rawData) : [];
      } catch (error) {
        return [];
      }
    }

    function saveSearchHistory(query) {
      const cleanQuery = query.trim();
      if (!cleanQuery) return;

      const history = getSearchHistory().filter(item => item.toLowerCase() !== cleanQuery.toLowerCase());
      history.unshift(cleanQuery);
      const limitedHistory = history.slice(0, MAX_SEARCH_HISTORY);
      localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(limitedHistory));
      renderSearchHistory();
    }

    function renderSearchHistory() {
      const history = getSearchHistory();

      if (history.length === 0) {
        historyChips.innerHTML = '';
        historyEmpty.classList.remove('hidden');
        clearHistoryButton.classList.add('hidden');
        return;
      }

      historyEmpty.classList.add('hidden');
      clearHistoryButton.classList.remove('hidden');
      historyChips.innerHTML = history.map(item => `
        <button class="history-chip rounded-full border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 hover:border-blue-500 hover:text-blue-600 transition" data-query="${item}">
          <i class="fas fa-clock mr-1 text-slate-400"></i>${item}
        </button>
      `).join('');
    }

    function renderRecommendations() {
      recommendationsGrid.innerHTML = mockProducts.slice(0, 4).map(product => `
        <button class="recommendation-card group overflow-hidden rounded-2xl border border-slate-200 bg-white text-left hover:shadow-lg transition-shadow" data-query="${product.name}">
          <div class="bg-slate-50 p-4">
            <img alt="${product.name}" class="mx-auto h-28 object-contain group-hover:scale-105 transition-transform lazyload" src="${product.image}" data-src="${product.image}">
          </div>
          <div class="p-4 space-y-2">
            <p class="truncate text-sm font-bold text-slate-800 group-hover:text-blue-600 transition">${product.name}</p>
            <p class="text-sm font-extrabold text-blue-700">${product.price}</p>
            <p class="text-xs text-slate-500">${product.store} • ${product.location}</p>
          </div>
        </button>
      `).join('');

      if (window.lazyLoadInstance) {
        window.lazyLoadInstance.update();
      }
    }

    // Search functionality
    function performSearch(query) {
      if (query.trim() === '') {
        suggestionsSection.classList.remove('hidden');
        resultsSection.classList.add('hidden');
        return;
      }

      searchQuery.textContent = query;
      suggestionsSection.classList.add('hidden');
      resultsSection.classList.remove('hidden');

      // Render results
      resultsGrid.innerHTML = mockProducts.map(product => `
        <div class="group overflow-hidden rounded-2xl border border-slate-200 bg-white hover:shadow-lg transition-shadow">
          <div class="bg-slate-50 p-4">
            <img alt="${product.name}" class="mx-auto h-36 object-contain group-hover:scale-105 transition-transform lazyload" src="${product.image}" data-src="${product.image}">
          </div>
          <div class="p-4 space-y-3">
            <p class="truncate text-sm font-bold group-hover:text-blue-600 transition">${product.name}</p>
            <p class="text-sm font-extrabold text-blue-700">${product.price}</p>
            <div class="flex items-center gap-1 text-xs text-amber-400">
              <i class="fas fa-star"></i>
              <span class="text-slate-500 ml-1">${product.rating}</span>
            </div>

            <!-- CTA Button - Mobile Only -->
            <a href="halaman_product_detail.html" class="mt-3 flex h-10 items-center justify-center gap-2 rounded-xl bg-blue-600 px-3 text-xs font-bold text-white hover:bg-blue-700 transition sm:hidden">
              <i class="fas fa-eye"></i> Lihat Detail
            </a>
          </div>
        </div>
      `).join('');

      // Lazy load images
      if (window.lazyLoadInstance) {
        window.lazyLoadInstance.update();
      }
    }

    function submitSearch(query) {
      performSearch(query);
      saveSearchHistory(query);
    }

    // Event listeners
    searchInput.addEventListener('input', (e) => {
      performSearch(e.target.value);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        submitSearch(searchInput.value);
      }
    });

    searchButton.addEventListener('click', () => {
      submitSearch(searchInput.value);
    });

    // Suggestion chip clicks
    suggestionChips.forEach(chip => {
      chip.addEventListener('click', () => {
        searchInput.value = chip.textContent;
        submitSearch(chip.textContent);
      });
    });

    historyChips.addEventListener('click', (e) => {
      const chip = e.target.closest('.history-chip');
      if (!chip) return;
      const query = chip.dataset.query || '';
      searchInput.value = query;
      submitSearch(query);
    });

    clearHistoryButton.addEventListener('click', () => {
      localStorage.removeItem(SEARCH_HISTORY_KEY);
      renderSearchHistory();
    });

    recommendationsGrid.addEventListener('click', (e) => {
      const card = e.target.closest('.recommendation-card');
      if (!card) return;
      const query = card.dataset.query || '';
      searchInput.value = query;
      submitSearch(query);
    });

    renderRecommendations();
    renderSearchHistory();

    // Focus on search input on page load
    searchInput.focus();
  </script>
</body>
</html>
