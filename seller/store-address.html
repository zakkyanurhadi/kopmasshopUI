<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Store Address - Kopmas Shop</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Lexend Deca', ui-sans-serif, system-ui; margin: 0; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .transition-300 { transition: all 300ms ease; }
    .bg-custom-background { background-color: #f3f5f9; }
    .bg-custom-blue { background-color: #1053d5; }
    .bg-custom-blue-10 { background-color: rgba(16, 83, 213, 0.1); }
    .bg-custom-black { background-color: #292d32; }
    .text-custom-blue { color: #1053d5; }
    .text-custom-grey { color: #6a7686; }
    .text-custom-black { color: #292d32; }
    .border-custom-stroke { border-color: #e8e8e8; }
    .sidebar-item.active { background-color: rgba(16, 83, 213, 0.1); }
    .sidebar-item.active .sidebar-label { color: #1053d5; }
    .sidebar-item.active .icon-default { opacity: 0; }
    .sidebar-item.active .icon-active { opacity: 1; }
    .sidebar-item.active .active-bar { display: flex; }
    .branch-line { width: 2px; height: 100%; background-color: #e5e7eb; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 1px; }
    .branch-line:last-child { height: 55%; }
    .curve-branch { position: absolute; left: 0; top: 0; width: 28px; height: 32px; border-left: 2px solid #e5e7eb; border-bottom: 2px solid #e5e7eb; border-bottom-left-radius: 16px; background: transparent; z-index: 1; transform: translateX(-104%); }
    .custom-select {
      height: 52px;
      width: 100%;
      appearance: none;
      border-radius: 14px;
      border: 1.5px solid #e8e8e8;
      padding-left: 1rem;
      padding-right: 2.5rem;
      font-weight: 500;
      font-size: 0.9375rem;
      background-color: white;
      cursor: pointer;
      background-image: url('../assets/images/icons/arrow-down-black.svg');
      background-repeat: no-repeat;
      background-position: right 0.75rem center;
      background-size: 1.25rem;
      transition: all 300ms ease;
    }
    .custom-select:focus { border-color: #1053d5; outline: none; }
    .custom-input {
      height: 52px;
      width: 100%;
      border-radius: 14px;
      border: 1.5px solid #e8e8e8;
      padding: 0 1rem;
      font-weight: 500;
      font-size: 0.9375rem;
      transition: all 300ms ease;
    }
    .custom-input:focus { border-color: #1053d5; outline: none; }
    .custom-textarea {
      width: 100%;
      border-radius: 14px;
      border: 1.5px solid #e8e8e8;
      padding: 0.9rem 1rem;
      font-weight: 500;
      font-size: 0.9375rem;
      resize: vertical;
      transition: all 300ms ease;
    }
    .custom-textarea:focus { border-color: #1053d5; outline: none; }
    .field-title {
      font-weight: 700;
      font-size: 0.9375rem;
      color: #292d32;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .fixed-location-box {
      border: 1.5px solid #e8e8e8;
      border-radius: 14px;
      background: #f8fbff;
      padding: 0.875rem 1rem;
    }
    .map-canvas {
      width: 100%;
      height: 300px;
      border-radius: 14px;
      border: 1.5px solid #e8e8e8;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-custom-background text-custom-black">
  <div id="admin-app" data-page-title="Store Address" data-role="seller">
    <form id="address-form" class="rounded-[20px] bg-white p-5 md:p-6 flex flex-col gap-6">
      <h2 class="font-bold text-xl">Alamat Toko</h2>

      <section class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-3 md:gap-5">
        <div class="field-title"><span class="text-red-500">*</span> Lokasi</div>
        <div class="flex flex-col gap-3">
          <div class="fixed-location-box">
            <p class="text-xs font-medium text-custom-grey">Wilayah Tetap</p>
            <p class="font-semibold text-custom-black mt-1">Indonesia</p>
            <p class="font-semibold text-custom-black">DI Yogyakarta</p>
            <p class="font-semibold text-custom-black">Kabupaten Sleman</p>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <select class="custom-select" id="kapanewon">
              <option value="">Pilih Kapanewon (Sleman)</option>
            </select>
            <select class="custom-select" id="kalurahan">
              <option value="">Pilih Kalurahan</option>
            </select>
          </div>
        </div>
      </section>

      <section class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-3 md:gap-5">
        <div class="field-title"><span class="text-red-500">*</span> Kode Pos</div>
        <div class="max-w-[240px]">
          <input type="text" class="custom-input" id="kode-pos" maxlength="5" value="55281" placeholder="Masukkan kode pos">
        </div>
      </section>

      <section class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-3 md:gap-5">
        <div class="field-title"><span class="text-red-500">*</span> Alamat</div>
        <textarea class="custom-textarea" id="alamat-lengkap" rows="4" placeholder="Masukkan alamat lengkap">Jl. Anggrek No. 123, RT 05/RW 02, Dekat SPBU</textarea>
      </section>

      <section class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-3 md:gap-5">
        <div class="field-title">Map Lokasi</div>
        <div class="flex flex-col gap-3">
          <div id="store-map" class="map-canvas"></div>
          <div class="flex flex-wrap items-center gap-2">
            <button type="button" id="btn-current-location" class="h-10 rounded-full px-4 bg-custom-blue-10 text-custom-blue font-semibold text-sm hover:opacity-90 transition-300">Gunakan Lokasi Saat Ini</button>
            <a id="google-maps-link" href="https://www.google.com/maps?q=-7.71636,110.35530" target="_blank" rel="noopener noreferrer" class="h-10 inline-flex items-center rounded-full px-4 border border-custom-stroke text-custom-grey font-semibold text-sm hover:bg-[#f7f8fb] transition-300">Buka di Google Maps</a>
          </div>
          <p class="text-xs text-custom-grey">Klik peta atau geser pin untuk menyesuaikan titik lokasi toko agar lebih akurat.</p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <input id="latitude" class="custom-input" readonly value="-7.71636" aria-label="Latitude">
            <input id="longitude" class="custom-input" readonly value="110.35530" aria-label="Longitude">
          </div>
        </div>
      </section>

      <div class="flex items-center justify-end gap-3 pt-2">
        <button type="reset" class="h-11 rounded-full px-6 border border-custom-stroke font-semibold text-custom-grey hover:bg-[#f7f8fb] transition-300">Reset</button>
        <button type="submit" class="h-11 rounded-full px-6 bg-custom-blue text-white font-semibold hover:opacity-95 transition-300">Simpan Alamat</button>
      </div>
    </form>
  </div>
  <script src="../admin-layout.js" defer></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const BASE_URL = 'https://www.emsifa.com/api-wilayah-indonesia/api';
    const SLEMAN_REGENCY_ID = '3404';
    const DEFAULT_POINT = { lat: -7.71636, lng: 110.35530 };

    let slemanDistricts = [];
    let mapInstance = null;
    let markerInstance = null;

    window.addEventListener('load', function () {
      setTimeout(initializePage, 0);
    });

    async function initializePage() {
      bindEvents();
      initMap();
      await loadKapanewonFromApi();
    }

    function bindEvents() {
      const form = document.getElementById('address-form');
      const kapanewonSelect = document.getElementById('kapanewon');
      const kalurahanSelect = document.getElementById('kalurahan');
      const currentLocationBtn = document.getElementById('btn-current-location');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        alert('Alamat berhasil disimpan!');
      });

      form.addEventListener('reset', function () {
        setTimeout(async function () {
          await applyDefaultLocation();
          setMapPoint(DEFAULT_POINT.lat, DEFAULT_POINT.lng, true);
        }, 0);
      });

      kapanewonSelect.addEventListener('change', function () {
        loadKalurahanFromApi(this.value);
      });

      kalurahanSelect.addEventListener('change', function () {
        updateMapFromSelection();
      });

      currentLocationBtn.addEventListener('click', function () {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(function (position) {
          setMapPoint(position.coords.latitude, position.coords.longitude, true);
        });
      });
    }

    function initMap() {
      const mapEl = document.getElementById('store-map');
      if (!mapEl || typeof L === 'undefined') return;

      mapInstance = L.map('store-map').setView([DEFAULT_POINT.lat, DEFAULT_POINT.lng], 13);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(mapInstance);

      markerInstance = L.marker([DEFAULT_POINT.lat, DEFAULT_POINT.lng], { draggable: true }).addTo(mapInstance);
      markerInstance.on('dragend', function () {
        const p = markerInstance.getLatLng();
        updateCoordinates(p.lat, p.lng);
      });

      mapInstance.on('click', function (e) {
        setMapPoint(e.latlng.lat, e.latlng.lng, false);
      });

      updateCoordinates(DEFAULT_POINT.lat, DEFAULT_POINT.lng);
      setTimeout(function () {
        mapInstance.invalidateSize();
      }, 180);
    }

    function setMapPoint(lat, lng, moveCamera) {
      if (!markerInstance || !mapInstance) return;
      markerInstance.setLatLng([lat, lng]);
      if (moveCamera) {
        mapInstance.setView([lat, lng], 15);
      }
      updateCoordinates(lat, lng);
    }

    function updateCoordinates(lat, lng) {
      const latValue = Number(lat).toFixed(6);
      const lngValue = Number(lng).toFixed(6);
      document.getElementById('latitude').value = latValue;
      document.getElementById('longitude').value = lngValue;
      document.getElementById('google-maps-link').href = 'https://www.google.com/maps?q=' + latValue + ',' + lngValue;
    }

    async function loadKapanewonFromApi() {
      const kapanewonSelect = document.getElementById('kapanewon');
      const kalurahanSelect = document.getElementById('kalurahan');

      try {
        const response = await fetch(`${BASE_URL}/districts/${SLEMAN_REGENCY_ID}.json`);
        const data = await response.json();
        slemanDistricts = Array.isArray(data) ? data : [];

        kapanewonSelect.innerHTML = '<option value="">Pilih Kapanewon (Sleman)</option>';
        slemanDistricts.forEach(function (district) {
          const option = document.createElement('option');
          option.value = district.id;
          option.textContent = toTitleCase(district.name);
          kapanewonSelect.appendChild(option);
        });

        kalurahanSelect.innerHTML = '<option value="">Pilih Kalurahan</option>';
        kalurahanSelect.disabled = true;
        await applyDefaultLocation();
      } catch (error) {
        console.error('Error loading Sleman districts:', error);
      }
    }

    async function applyDefaultLocation() {
      const kapanewonSelect = document.getElementById('kapanewon');
      const defaultDistrict = slemanDistricts.find(function (d) {
        return (d.name || '').toUpperCase().includes('DEPOK');
      }) || slemanDistricts[0];

      if (!defaultDistrict) return;
      kapanewonSelect.value = defaultDistrict.id;
      await loadKalurahanFromApi(defaultDistrict.id);
    }

    async function loadKalurahanFromApi(districtId) {
      const kalurahanSelect = document.getElementById('kalurahan');

      if (!districtId) {
        kalurahanSelect.innerHTML = '<option value="">Pilih Kalurahan</option>';
        kalurahanSelect.disabled = true;
        return;
      }

      try {
        const response = await fetch(`${BASE_URL}/villages/${districtId}.json`);
        const villages = await response.json();

        kalurahanSelect.innerHTML = '<option value="">Pilih Kalurahan</option>';
        (Array.isArray(villages) ? villages : []).forEach(function (village) {
          const option = document.createElement('option');
          option.value = village.id;
          option.textContent = toTitleCase(village.name);
          kalurahanSelect.appendChild(option);
        });

        kalurahanSelect.disabled = false;

        const defaultVillage = Array.from(kalurahanSelect.options).find(function (opt) {
          return (opt.textContent || '').toUpperCase().includes('CATURTUNGGAL');
        }) || kalurahanSelect.options[1];

        if (defaultVillage) {
          kalurahanSelect.value = defaultVillage.value;
        }
        await updateMapFromSelection();
      } catch (error) {
        console.error('Error loading Kalurahan:', error);
      }
    }

    async function updateMapFromSelection() {
      const kapanewonText = getSelectedText('kapanewon');
      const kalurahanText = getSelectedText('kalurahan');
      if (!kapanewonText) return;

      const q = [
        kalurahanText || '',
        'Kapanewon ' + kapanewonText,
        'Sleman',
        'DI Yogyakarta',
        'Indonesia'
      ].filter(Boolean).join(', ');

      try {
        const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q);
        const response = await fetch(url);
        const result = await response.json();
        if (Array.isArray(result) && result.length > 0) {
          setMapPoint(Number(result[0].lat), Number(result[0].lon), true);
        }
      } catch (error) {
        console.error('Error updating map location:', error);
      }
    }

    function getSelectedText(selectId) {
      const select = document.getElementById(selectId);
      if (!select || select.selectedIndex < 0) return '';
      return (select.options[select.selectedIndex].textContent || '').trim();
    }

    function toTitleCase(value) {
      return String(value || '').toLowerCase().replace(/\b\w/g, function (ch) { return ch.toUpperCase(); });
    }
  </script>
</body>
</html>
