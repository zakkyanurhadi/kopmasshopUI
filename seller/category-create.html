<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Category Create - Kopmas Shop</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Lexend Deca', ui-sans-serif, system-ui; margin: 0; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .transition-300 { transition: all 300ms ease; }
    .bg-custom-background { background-color: #f3f5f9; }
    .bg-custom-blue { background-color: #1053d5; }
    .bg-custom-blue-10 { background-color: rgba(16, 83, 213, 0.1); }
    .bg-custom-black { background-color: #292d32; }
    .bg-custom-icon-background { background-color: #f3f3f3; }
    .bg-custom-stroke { background-color: #e8e8e8; }
    .text-custom-blue { color: #1053d5; }
    .text-custom-grey { color: #6a7686; }
    .text-custom-black { color: #292d32; }
    .border-custom-stroke { border-color: #e8e8e8; }
    .ring-custom-blue { --tw-ring-color: #1053d5; }
    .sidebar-item.active { background-color: rgba(16, 83, 213, 0.1); }
    .sidebar-item.active .sidebar-label { color: #1053d5; }
    .sidebar-item.active .icon-default { opacity: 0; }
    .sidebar-item.active .icon-active { opacity: 1; }
    .sidebar-item.active .active-bar { display: flex; }
    .branch-line { width: 2px; height: 100%; background-color: #e5e7eb; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 1px; }
    .branch-line:last-child { height: 55%; }
    .curve-branch { position: absolute; left: 0; top: 0; width: 28px; height: 32px; border-left: 2px solid #e5e7eb; border-bottom: 2px solid #e5e7eb; border-bottom-left-radius: 16px; background: transparent; z-index: 1; transform: translateX(-104%); }
    .border-custom-border { border-color: #e8e8e8; }
    .custom-input {
      height: 76px; width: 100%; appearance: none; border-radius: 18px; border-width: 1.5px;
      border-color: #e8e8e8; padding-left: 5rem; padding-right: 1.5rem;
      padding-bottom: 14.5px; padding-top: 34.5px; font-weight: 600; transition: all 300ms ease;
    }
    .custom-input:placeholder-shown { padding-top: 14.5px; }
    .custom-input:focus { border-color: #292d32; outline: none; }
    .input-placeholder {
      position: absolute; left: 81px; top: 25px; transform: translateY(-50%);
      font-size: 0.875rem; font-weight: 600; color: #6a7686; transition: all 300ms ease;
    }
    .group:focus-within .input-placeholder { top: 25px; }
    .group:has(:placeholder-shown) .input-placeholder {
      top: 38px; font-size: 1rem !important; font-weight: 700 !important; color: #292d32;
    }
    .input-icon {
      position: absolute; top: 50%; left: 1.5rem; display: flex; height: 28px;
      transform: translateY(-50%); align-items: center; border-right: 1.5px solid #e8e8e8; padding-right: 1rem;
    }
    .bg-custom-red { background-color: #ff133d; }
  </style>
</head>
<body class="bg-custom-background text-custom-black">
  <div id="admin-app" data-page-title="Category Create" data-role="seller">

    <form class="flex flex-col w-full rounded-3xl p-5 gap-5 bg-white">
      <h2 class="font-bold text-xl capitalize">Complete the form</h2>
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Category Image</p>
        <div class="flex items-center justify-between w-1/2">
          <div class="group relative flex size-[100px] p-[26px] rounded-2xl overflow-hidden items-center justify-center bg-custom-background">
            <img id="Thumbnail" src="../assets/images/icons/gallery-grey.svg" class="size-full object-contain" alt="icon">
            <input type="file" id="File-Input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
          </div>
          <button type="button" id="Add-Photo" class="flex items-center justify-center rounded-2xl py-4 px-6 bg-custom-black text-white font-semibold text-lg">Add Photo</button>
        </div>
      </div>
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Category Name</p>
        <div class="flex flex-col gap-2 w-1/2">
          <label class="group relative">
            <div class="input-icon"><img src="../assets/images/icons/note-grey.svg" class="flex size-6 shrink-0" alt="icon"></div>
            <p class="input-placeholder">Enter Category Name</p>
            <input type="text" class="custom-input" placeholder="">
          </label>
        </div>
      </div>
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Category Tagline</p>
        <div class="flex flex-col gap-2 w-1/2">
          <label class="group relative">
            <div class="input-icon"><img src="../assets/images/icons/stickynote-grey.svg" class="flex size-6 shrink-0" alt="icon"></div>
            <p class="input-placeholder">Enter Tagline Category</p>
            <input type="text" class="custom-input" placeholder="">
          </label>
        </div>
      </div>
      <div class="flex justify-between">
        <p class="font-semibold text-custom-grey mt-5">Category Description</p>
        <div class="flex flex-col gap-2 w-1/2">
          <label class="group flex py-4 px-6 rounded-3xl border-[2px] border-custom-border focus-within:border-[#292d32] transition-300 w-full">
            <div class="flex h-full pr-4 pt-2 border-r-[1.5px] border-custom-border"><img src="../assets/images/icons/document-text-grey.svg" class="flex size-6 shrink-0" alt="icon"></div>
            <div class="flex flex-col gap-[6px] pl-4 w-full">
              <p class="font-semibold text-custom-grey text-sm">Enter Category Description</p>
              <textarea class="appearance-none outline-none w-full font-semibold leading-[160%]" rows="3" placeholder=""></textarea>
            </div>
          </label>
        </div>
      </div>
      <div class="flex items-center justify-end gap-4">
        <a href="category-list.html" class="flex items-center justify-center h-14 rounded-full py-4 px-6 gap-2 bg-custom-red text-white font-semibold text-lg">Cancel</a>
        <button type="submit" class="flex items-center justify-center h-14 rounded-full py-4 px-6 gap-2 bg-custom-blue text-white font-semibold text-lg">Create Now</button>
      </div>
    </form>

  </div>
  <script src="../admin-layout.js" defer></script>
</body>
</html>
