<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Product List - Kopmas Shop</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Lexend Deca', ui-sans-serif, system-ui; margin: 0; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .transition-300 { transition: all 300ms ease; }
    .bg-custom-background { background-color: #f3f5f9; }
    .bg-custom-blue { background-color: #1053d5; }
    .bg-custom-blue-10 { background-color: rgba(16, 83, 213, 0.1); }
    .bg-custom-black { background-color: #292d32; }
    .bg-custom-icon-background { background-color: #f3f3f3; }
    .bg-custom-stroke { background-color: #e8e8e8; }
    .text-custom-blue { color: #1053d5; }
    .text-custom-grey { color: #6a7686; }
    .text-custom-black { color: #292d32; }
    .border-custom-stroke { border-color: #e8e8e8; }
    .ring-custom-blue { --tw-ring-color: #1053d5; }
    .sidebar-item.active { background-color: rgba(16, 83, 213, 0.1); }
    .sidebar-item.active .sidebar-label { color: #1053d5; }
    .sidebar-item.active .icon-default { opacity: 0; }
    .sidebar-item.active .icon-active { opacity: 1; }
    .sidebar-item.active .active-bar { display: flex; }
    .branch-line { width: 2px; height: 100%; background-color: #e5e7eb; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 1px; }
    .branch-line:last-child { height: 55%; }
    .curve-branch { position: absolute; left: 0; top: 0; width: 28px; height: 32px; border-left: 2px solid #e5e7eb; border-bottom: 2px solid #e5e7eb; border-bottom-left-radius: 16px; background: transparent; z-index: 1; transform: translateX(-104%); }
  </style>
</head>
<body class="bg-custom-background text-custom-black">
  <div id="admin-app" data-page-title="Product List" data-role="admin">

        <div class="flex flex-col gap-5 rounded-[20px] bg-white p-5">
      <div class="flex items-center justify-between">
        <h2 class="font-bold text-xl">Product List</h2>
        <a href="product-create.html" class="flex h-12 items-center rounded-full bg-custom-blue px-6 font-semibold text-white hover:ring-2 ring-custom-blue transition-300">+ Add Product</a>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead><tr class="border-b border-custom-stroke">
            <th class="py-3 px-4 font-semibold text-custom-grey">No</th>
            <th class="py-3 px-4 font-semibold text-custom-grey">Product</th>
            <th class="py-3 px-4 font-semibold text-custom-grey">Price</th>
            <th class="py-3 px-4 font-semibold text-custom-grey">Action</th>
          </tr></thead>
          <tbody>
            <tr class="border-b border-custom-stroke"><td class="py-3 px-4">1</td><td class="py-3 px-4 font-semibold">iPhone 15 Pro</td><td class="py-3 px-4">Rp 19.999.000</td><td class="py-3 px-4"><a href="product-detail.html" class="font-semibold text-custom-blue hover:underline">Detail</a></td></tr>
            <tr class="border-b border-custom-stroke"><td class="py-3 px-4">2</td><td class="py-3 px-4 font-semibold">Samsung Galaxy S24</td><td class="py-3 px-4">Rp 14.999.000</td><td class="py-3 px-4"><a href="product-detail.html" class="font-semibold text-custom-blue hover:underline">Detail</a></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
  <script src="../admin-layout.js" defer></script>
</body>
</html>
