<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Product List - Kopmas Shop</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Lexend Deca', ui-sans-serif, system-ui; margin: 0; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .transition-300 { transition: all 300ms ease; }
    .bg-custom-background { background-color: #f3f5f9; }
    .bg-custom-blue { background-color: #1053d5; }
    .bg-custom-blue-10 { background-color: rgba(16, 83, 213, 0.1); }
    .bg-custom-black { background-color: #292d32; }
    .bg-custom-icon-background { background-color: #f3f3f3; }
    .bg-custom-stroke { background-color: #e8e8e8; }
    .text-custom-blue { color: #1053d5; }
    .text-custom-grey { color: #6a7686; }
    .text-custom-black { color: #292d32; }
    .border-custom-stroke { border-color: #e8e8e8; }
    .ring-custom-blue { --tw-ring-color: #1053d5; }
    .sidebar-item.active { background-color: rgba(16, 83, 213, 0.1); }
    .sidebar-item.active .sidebar-label { color: #1053d5; }
    .sidebar-item.active .icon-default { opacity: 0; }
    .sidebar-item.active .icon-active { opacity: 1; }
    .sidebar-item.active .active-bar { display: flex; }
    .branch-line { width: 2px; height: 100%; background-color: #e5e7eb; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 1px; }
    .branch-line:last-child { height: 55%; }
    .curve-branch { position: absolute; left: 0; top: 0; width: 28px; height: 32px; border-left: 2px solid #e5e7eb; border-bottom: 2px solid #e5e7eb; border-bottom-left-radius: 16px; background: transparent; z-index: 1; transform: translateX(-104%); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lazysizes@5.3.2/lazysizes.min.js" async></script>
</head>
<body class="bg-custom-background text-custom-black">
  <div id="admin-app" data-page-title="Product List" data-role="admin">

    <!-- Stats Cards -->
    <div class="flex w-full gap-5">
      <div class="flex flex-col w-full rounded-[20px] p-5 gap-6 bg-white">
        <div class="flex flex-col gap-6">
          <div class="flex size-[56px] items-center justify-center rounded-full bg-custom-blue-10">
            <img src="../assets/images/icons/shopping-cart-blue.svg" class="flex size-6 shrink-0" alt="icon">
          </div>
          <div class="flex flex-col gap-[6px]">
            <p class="font-bold text-4xl">2</p>
            <p class="font-medium text-lg text-custom-grey">Total Products</p>
          </div>
        </div>
      </div>
      <div class="flex flex-col w-full rounded-[20px] p-5 gap-6 bg-white">
        <div class="flex flex-col gap-6">
          <div class="flex size-[56px] items-center justify-center rounded-full bg-custom-blue-10">
            <img src="../assets/images/icons/presention-chart-blue.svg" class="flex size-6 shrink-0" alt="icon">
          </div>
          <div class="flex flex-col gap-[6px]">
            <p class="font-bold text-4xl">3.200</p>
            <p class="font-medium text-lg text-custom-grey">Total Sold</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Product List -->
    <div class="flex flex-col flex-1 rounded-[20px] p-5 gap-6 bg-white">
      <!-- Header -->
      <div class="header flex items-center justify-between">
        <div class="flex flex-col gap-2">
          <p class="font-bold text-xl">All Products</p>
          <div class="flex items-center gap-1">
            <img src="../assets/images/icons/shopping-cart-grey.svg" class="flex size-6 shrink-0" alt="icon">
            <p class="font-semibold text-custom-grey">2 Total Products</p>
          </div>
        </div>
        <a href="product-create.html" class="flex h-14 items-center rounded-full py-4 px-6 bg-custom-blue gap-[6px]">
          <span class="font-semibold text-lg text-white leading-none">Add New</span>
          <img src="../assets/images/icons/add-circle-white.svg" class="flex size-6 shrink-0" alt="icon">
        </a>
      </div>

      <!-- Filter -->
      <div id="Filter" class="flex items-center justify-between">
        <form action="#">
          <label class="flex items-center w-[370px] h-14 rounded-2xl p-4 gap-2 bg-white border border-custom-stroke focus-within:border-[#292d32] transition-300">
            <img src="../assets/images/icons/box-search-grey.svg" class="flex size-6 shrink-0" alt="icon">
            <input type="text" class="appearance-none w-full placeholder:text-custom-grey font-medium focus:outline-none" placeholder="Search product">
          </label>
        </form>
        <div class="flex items-center gap-4">
          <p class="font-medium text-custom-grey">Show</p>
          <label class="flex items-center h-14 rounded-2xl border border-custom-stroke py-4 px-5 pl-3 bg-white focus-within:border-[#292d32] transition-300">
            <select class="text-custom-black font-medium appearance-none focus:outline-none p-2">
              <option value="10" class="font-medium">10 Entries</option>
              <option value="20" class="font-medium">20 Entries</option>
              <option value="40" class="font-medium">40 Entries</option>
            </select>
            <img src="../assets/images/icons/arrow-down-black.svg" class="flex size-6 shrink-0 -ml-1" alt="icon">
          </label>
        </div>
      </div>

      <!-- List Products -->
      <div id="List-Categories" class="flex flex-col gap-6">
        <div id="List" class="flex flex-col gap-5">

          <!-- Product Card 1 -->
          <div class="card flex flex-col rounded-[20px] border border-custom-stroke py-[18px] px-5 gap-5 bg-white">
            <div class="flex items-center gap-5 justify-between pr-[30px]">
              <div class="flex w-full items-center gap-[14px] overflow-hidden">
                <div class="flex size-[92px] shrink-0 rounded-2xl bg-custom-background overflow-hidden items-center justify-center">
                  <img src="../assets/images/icons/gallery-grey.svg" class="size-full object-contain" alt="icon">
                </div>
                <div class="flex flex-col flex-1 gap-[6px] overflow-hidden">
                  <p class="font-bold text-lg truncate">iPhone 15 Pro</p>
                  <p class="font-semibold leading-none text-custom-grey flex items-center gap-[6px]">
                    <span class="font-bold text-custom-blue">Elektronik</span>
                  </p>
                </div>
              </div>
              <div class="flex items-center gap-[10px] w-full">
                <div class="flex size-14 shrink-0 rounded-full bg-custom-icon-background overflow-hidden items-center justify-center">
                  <img src="../assets/images/icons/status-up-black.svg" class="flex size-6 shrink-0" alt="icon">
                </div>
                <div class="flex flex-col gap-1">
                  <p class="font-bold text-lg leading-none">500</p>
                  <p class="font-semibold text-custom-grey">Total Sold</p>
                </div>
              </div>
              <div class="flex items-center gap-[10px] w-full">
                <div class="flex size-14 shrink-0 rounded-full bg-custom-icon-background overflow-hidden items-center justify-center">
                  <img src="../assets/images/icons/box-black.svg" class="flex size-6 shrink-0" alt="icon">
                </div>
                <div class="flex flex-col gap-1">
                  <p class="font-bold text-lg leading-none">120</p>
                  <p class="font-semibold text-custom-grey">Total Stock</p>
                </div>
              </div>
            </div>
            <hr class="border-custom-stroke">
            <div class="flex items-center justify-between">
              <p class="flex items-center gap-2 font-semibold text-custom-grey leading-none">
                <img src="../assets/images/icons/calendar-2-grey.svg" class="size-6 flex shrink-0" alt="icon">
                Created on 19/02/2020
              </p>
              <div class="flex items-center justify-end gap-[14px]">
                <button class="flex items-center justify-center h-14 w-[126px] shrink-0 rounded-2xl p-4 gap-2 bg-[rgba(255,19,61,0.1)]">
                  <img src="../assets/images/icons/trash-red.svg" class="flex size-6 shrink-0" alt="icon">
                  <span class="font-semibold" style="color:#ff133d">Delete</span>
                </button>
                <a href="product-edit.html" class="flex items-center justify-center h-14 w-[126px] shrink-0 rounded-2xl p-4 gap-2 bg-custom-black">
                  <img src="../assets/images/icons/edit-white.svg" class="flex size-6 shrink-0" alt="icon">
                  <span class="font-semibold text-white">Edit</span>
                </a>
                <a href="product-detail.html" class="flex items-center justify-center h-14 w-[126px] shrink-0 rounded-2xl p-4 gap-2 bg-custom-blue">
                  <img src="../assets/images/icons/eye-white.svg" class="flex size-6 shrink-0" alt="icon">
                  <span class="font-semibold text-white">Details</span>
                </a>
              </div>
            </div>
          </div>

          <!-- Product Card 2 -->
          <div class="card flex flex-col rounded-[20px] border border-custom-stroke py-[18px] px-5 gap-5 bg-white">
            <div class="flex items-center gap-5 justify-between pr-[30px]">
              <div class="flex w-full items-center gap-[14px] overflow-hidden">
                <div class="flex size-[92px] shrink-0 rounded-2xl bg-custom-background overflow-hidden items-center justify-center">
                  <img src="../assets/images/icons/gallery-grey.svg" class="size-full object-contain" alt="icon">
                </div>
                <div class="flex flex-col flex-1 gap-[6px] overflow-hidden">
                  <p class="font-bold text-lg truncate">Samsung Galaxy S24</p>
                  <p class="font-semibold leading-none text-custom-grey flex items-center gap-[6px]">
                    <span class="font-bold text-custom-blue">Elektronik</span>
                  </p>
                </div>
              </div>
              <div class="flex items-center gap-[10px] w-full">
                <div class="flex size-14 shrink-0 rounded-full bg-custom-icon-background overflow-hidden items-center justify-center">
                  <img src="../assets/images/icons/status-up-black.svg" class="flex size-6 shrink-0" alt="icon">
                </div>
                <div class="flex flex-col gap-1">
                  <p class="font-bold text-lg leading-none">500</p>
                  <p class="font-semibold text-custom-grey">Total Sold</p>
                </div>
              </div>
              <div class="flex items-center gap-[10px] w-full">
                <div class="flex size-14 shrink-0 rounded-full bg-custom-icon-background overflow-hidden items-center justify-center">
                  <img src="../assets/images/icons/box-black.svg" class="flex size-6 shrink-0" alt="icon">
                </div>
                <div class="flex flex-col gap-1">
                  <p class="font-bold text-lg leading-none">85</p>
                  <p class="font-semibold text-custom-grey">Total Stock</p>
                </div>
              </div>
            </div>
            <hr class="border-custom-stroke">
            <div class="flex items-center justify-between">
              <p class="flex items-center gap-2 font-semibold text-custom-grey leading-none">
                <img src="../assets/images/icons/calendar-2-grey.svg" class="size-6 flex shrink-0" alt="icon">
                Created on 19/02/2020
              </p>
              <div class="flex items-center justify-end gap-[14px]">
                <button class="flex items-center justify-center h-14 w-[126px] shrink-0 rounded-2xl p-4 gap-2 bg-[rgba(255,19,61,0.1)]">
                  <img src="../assets/images/icons/trash-red.svg" class="flex size-6 shrink-0" alt="icon">
                  <span class="font-semibold" style="color:#ff133d">Delete</span>
                </button>
                <a href="product-edit.html" class="flex items-center justify-center h-14 w-[126px] shrink-0 rounded-2xl p-4 gap-2 bg-custom-black">
                  <img src="../assets/images/icons/edit-white.svg" class="flex size-6 shrink-0" alt="icon">
                  <span class="font-semibold text-white">Edit</span>
                </a>
                <a href="product-detail.html" class="flex items-center justify-center h-14 w-[126px] shrink-0 rounded-2xl p-4 gap-2 bg-custom-blue">
                  <img src="../assets/images/icons/eye-white.svg" class="flex size-6 shrink-0" alt="icon">
                  <span class="font-semibold text-white">Details</span>
                </a>
              </div>
            </div>
          </div>

        </div>

        <!-- Pagination -->
        <nav id="Pagination">
          <ul class="flex items-center gap-3">
            <li class="group">
              <button disabled class="flex size-11 shrink-0 rounded-full items-center justify-center bg-custom-blue-10 text-custom-blue font-semibold">
                <img src="../assets/images/icons/arrow-right-no-tail-blue.svg" class="size-6 opacity-20 rotate-180" alt="icon">
              </button>
            </li>
            <li class="group">
              <button class="flex size-11 shrink-0 rounded-full items-center justify-center bg-custom-blue text-white font-semibold">1</button>
            </li>
            <li class="group">
              <button disabled class="flex size-11 shrink-0 rounded-full items-center justify-center bg-custom-blue-10 text-custom-blue font-semibold">
                <img src="../assets/images/icons/arrow-right-no-tail-blue.svg" class="size-6 opacity-20" alt="icon">
              </button>
            </li>
          </ul>
        </nav>
      </div>
    </div>

  </div>
  <script src="../admin-layout.js" defer></script>
</body>
</html>
