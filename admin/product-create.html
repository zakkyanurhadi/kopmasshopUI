<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Product Create - Kopmas Shop</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Lexend Deca', ui-sans-serif, system-ui; margin: 0; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .transition-300 { transition: all 300ms ease; }
    .bg-custom-background { background-color: #f3f5f9; }
    .bg-custom-blue { background-color: #1053d5; }
    .bg-custom-blue-10 { background-color: rgba(16, 83, 213, 0.1); }
    .bg-custom-black { background-color: #292d32; }
    .bg-custom-icon-background { background-color: #f3f3f3; }
    .bg-custom-stroke { background-color: #e8e8e8; }
    .text-custom-blue { color: #1053d5; }
    .text-custom-grey { color: #6a7686; }
    .text-custom-black { color: #292d32; }
    .border-custom-stroke { border-color: #e8e8e8; }
    .ring-custom-blue { --tw-ring-color: #1053d5; }
    .sidebar-item.active { background-color: rgba(16, 83, 213, 0.1); }
    .sidebar-item.active .sidebar-label { color: #1053d5; }
    .sidebar-item.active .icon-default { opacity: 0; }
    .sidebar-item.active .icon-active { opacity: 1; }
    .sidebar-item.active .active-bar { display: flex; }
    .branch-line { width: 2px; height: 100%; background-color: #e5e7eb; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 1px; }
    .branch-line:last-child { height: 55%; }
    .curve-branch { position: absolute; left: 0; top: 0; width: 28px; height: 32px; border-left: 2px solid #e5e7eb; border-bottom: 2px solid #e5e7eb; border-bottom-left-radius: 16px; background: transparent; z-index: 1; transform: translateX(-104%); }
    .border-custom-border { border-color: #e8e8e8; }
    .custom-input {
      height: 76px; width: 100%; appearance: none; border-radius: 18px; border-width: 1.5px;
      border-color: #e8e8e8; padding-left: 5rem; padding-right: 1.5rem;
      padding-bottom: 14.5px; padding-top: 34.5px; font-weight: 600; transition: all 300ms ease;
    }
    .custom-input:placeholder-shown { padding-top: 14.5px; }
    .custom-input:focus { border-color: #292d32; outline: none; }
    .input-placeholder {
      position: absolute; left: 81px; top: 25px; transform: translateY(-50%);
      font-size: 0.875rem; font-weight: 600; color: #6a7686; transition: all 300ms ease;
    }
    .group:focus-within .input-placeholder { top: 25px; }
    .group:has(:placeholder-shown) .input-placeholder {
      top: 38px; font-size: 1rem !important; font-weight: 700 !important; color: #292d32;
    }
    .input-icon {
      position: absolute; top: 50%; left: 1.5rem; display: flex; height: 28px;
      transform: translateY(-50%); align-items: center; border-right: 1.5px solid #e8e8e8; padding-right: 1rem;
    }
    .bg-custom-red { background-color: #ff133d; }
  
      :root {
        /* Ubah nilai ini untuk atur padding kanan-kiri secara manual */
        --page-side-padding-mobile-min: 20px;
        --page-side-padding-fluid: 5vw;
        --page-side-padding-desktop: 160px;
      }

      body .px-55 {
        padding-left: clamp(
          var(--page-side-padding-mobile-min),
          var(--page-side-padding-fluid),
          var(--page-side-padding-desktop)
        ) !important;
        padding-right: clamp(
          var(--page-side-padding-mobile-min),
          var(--page-side-padding-fluid),
          var(--page-side-padding-desktop)
        ) !important;
      }

      @media (min-width: 1280px) {
        body .px-55 {
          padding-left: var(--page-side-padding-desktop) !important;
          padding-right: var(--page-side-padding-desktop) !important;
        }
      }
    </style>
  <script src="https://cdn.jsdelivr.net/npm/lazysizes@5.3.2/lazysizes.min.js" async></script>
</head>
<body class="bg-custom-background text-custom-black">
  <div id="admin-app" data-page-title="Product Create" data-role="admin">

    <form class="flex flex-col w-full rounded-3xl p-5 gap-5 bg-white">
      <h2 class="font-bold text-xl capitalize">Complete the form</h2>

      <!-- Product Image -->
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Product Image</p>
        <div class="flex items-center justify-between w-1/2">
          <div class="group relative flex size-[100px] rounded-2xl overflow-hidden items-center justify-center bg-custom-background">
            <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
            <img src="../assets/images/icons/gallery-grey.svg" class="size-full object-contain pointer-events-none p-[26px]" alt="icon">
          </div>
          <div class="group relative flex size-[100px] rounded-2xl overflow-hidden items-center justify-center bg-custom-background">
            <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
            <img src="../assets/images/icons/gallery-grey.svg" class="size-full object-contain pointer-events-none p-[26px]" alt="icon">
          </div>
          <div class="group relative flex size-[100px] rounded-2xl overflow-hidden items-center justify-center bg-custom-background">
            <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
            <img src="../assets/images/icons/gallery-grey.svg" class="size-full object-contain pointer-events-none p-[26px]" alt="icon">
          </div>
          <div class="group relative flex size-[100px] rounded-2xl overflow-hidden items-center justify-center bg-custom-background">
            <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
            <img src="../assets/images/icons/gallery-grey.svg" class="size-full object-contain pointer-events-none p-[26px]" alt="icon">
          </div>
        </div>
      </div>

      <!-- Product Name -->
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Product Name</p>
        <div class="flex flex-col gap-2 w-1/2">
          <label class="group relative">
            <div class="input-icon">
              <img src="../assets/images/icons/shopping-cart-grey.svg" class="flex size-6 shrink-0" alt="icon">
            </div>
            <p class="input-placeholder">Enter Product Name</p>
            <input type="text" class="custom-input" placeholder="">
          </label>
        </div>
      </div>

      <!-- Product Weight -->
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Product Weight</p>
        <div class="flex flex-col gap-2 w-1/2">
          <div class="relative">
            <label class="group relative h-full block">
              <div class="input-icon">
                <img src="../assets/images/icons/box-2-grey.svg" class="flex size-6 shrink-0" alt="icon">
              </div>
              <p class="input-placeholder">Enter Product Weight</p>
              <input type="text" class="custom-input" style="padding-right:6rem" placeholder="">
            </label>
            <div class="absolute transform -translate-y-1/2 top-1/2 right-5 w-fit h-fit">
              <select class="rounded-lg py-[10px] px-4 bg-[rgba(16,83,213,0.1)] text-custom-blue font-extrabold text-sm h-[38px] w-[71px] appearance-none leading-none">
                <option value="" selected>KG</option>
              </select>
              <img src="../assets/images/icons/arrow-up-triangle-blue.svg" class="rotate-180 size-4 absolute transform -translate-y-1/2 top-1/2 right-[10px]" alt="icon">
            </div>
          </div>
        </div>
      </div>

      <!-- Product Type -->
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Product Type</p>
        <div class="grid grid-cols-2 gap-6 h-[76px] w-1/2">
          <label class="group relative flex items-center h-full py-4 px-5 gap-4 rounded-[18px] border-[2px] border-custom-stroke focus-within:border-[#292d32] transition-300 w-full">
            <div class="flex h-[28px] shrink-0 items-center pr-4 pl-1 border-r-[1.5px] border-custom-stroke">
              <img src="../assets/images/icons/gift-grey.svg" class="flex size-6 shrink-0" alt="icon">
            </div>
            <p class="font-bold leading-none w-full">New Item</p>
            <div class="flex size-4 shrink-0 rounded-full ring-2 ring-[#6a7686] border-[3px] border-white transition-300" id="radio-new"></div>
            <input type="radio" name="type" value="new" class="absolute opacity-0" checked onchange="document.getElementById('radio-new').style.backgroundColor='#1053d5';document.getElementById('radio-new').style.boxShadow='0 0 0 2px #1053d5';document.getElementById('radio-used').style.backgroundColor='';document.getElementById('radio-used').style.boxShadow='0 0 0 2px #6a7686';">
          </label>
          <label class="group relative flex items-center h-full py-4 px-5 gap-4 rounded-[18px] border-[2px] border-custom-stroke focus-within:border-[#292d32] transition-300 w-full">
            <div class="flex h-[28px] shrink-0 items-center pr-4 pl-1 border-r-[1.5px] border-custom-stroke">
              <img src="../assets/images/icons/box-grey.svg" class="flex size-6 shrink-0" alt="icon">
            </div>
            <p class="font-bold leading-none w-full">Used Item</p>
            <div class="flex size-4 shrink-0 rounded-full ring-2 ring-[#6a7686] border-[3px] border-white transition-300" id="radio-used"></div>
            <input type="radio" name="type" value="second" class="absolute opacity-0" onchange="document.getElementById('radio-used').style.backgroundColor='#1053d5';document.getElementById('radio-used').style.boxShadow='0 0 0 2px #1053d5';document.getElementById('radio-new').style.backgroundColor='';document.getElementById('radio-new').style.boxShadow='0 0 0 2px #6a7686';">
          </label>
        </div>
      </div>

      <!-- Product Description -->
      <div class="flex justify-between">
        <p class="font-semibold text-custom-grey mt-5">Product Description</p>
        <div class="flex flex-col gap-2 w-1/2">
          <label class="group flex py-4 px-6 rounded-3xl border-[2px] border-custom-border focus-within:border-[#292d32] transition-300 w-full">
            <div class="flex h-full pr-4 pt-2 border-r-[1.5px] border-custom-border">
              <img src="../assets/images/icons/stickynote-grey.svg" class="flex size-6 shrink-0" alt="icon">
            </div>
            <div class="flex flex-col gap-[6px] pl-4 w-full">
              <p class="font-semibold text-custom-grey text-sm">Enter Product Description</p>
              <textarea class="appearance-none outline-none w-full font-semibold leading-[160%]" rows="3" placeholder=""></textarea>
            </div>
          </label>
        </div>
      </div>

      <!-- Product Category -->
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Product Category</p>
        <div class="flex flex-col gap-2 w-1/2">
          <label class="group relative rounded-[18px] border-[1.5px] border-custom-stroke focus-within:border-[#292d32] transition-300 overflow-hidden w-full">
            <div class="input-icon">
              <img src="../assets/images/icons/bag-grey.svg" class="flex size-6 shrink-0" alt="icon">
            </div>
            <p class="font-bold absolute -translate-y-1/2 left-[81px] top-[25px] text-sm text-custom-grey font-semibold transition-300">
              Select Category
            </p>
            <select required class="appearance-none w-full h-[72px] font-semibold text-lg outline-none pl-20 pr-6 pb-[14.5px] pt-[32px]">
              <option hidden></option>
              <option value="1">Elektronik</option>
              <option value="2">Fashion</option>
              <option value="3">Makanan</option>
            </select>
            <img src="../assets/images/icons/arrow-down-black.svg" class="absolute transform -translate-y-1/2 top-1/2 right-6 size-6" alt="icon">
          </label>
        </div>
      </div>

      <!-- Product Sub Category -->
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Product Sub Category</p>
        <div class="flex flex-col gap-2 w-1/2">
          <label class="group relative rounded-[18px] border-[1.5px] border-custom-stroke focus-within:border-[#292d32] transition-300 overflow-hidden w-full">
            <div class="input-icon">
              <img src="../assets/images/icons/shopping-bag-black.svg" class="flex size-6 shrink-0" alt="icon">
            </div>
            <p class="font-bold absolute -translate-y-1/2 left-[81px] top-[25px] text-sm text-custom-grey font-semibold transition-300">
              Select Sub Category
            </p>
            <select required class="appearance-none w-full h-[72px] font-semibold text-lg outline-none pl-20 pr-6 pb-[14.5px] pt-[32px]">
              <option hidden></option>
              <option value="1">Smartphone</option>
              <option value="2">Laptop</option>
            </select>
            <img src="../assets/images/icons/arrow-down-black.svg" class="absolute transform -translate-y-1/2 top-1/2 right-6 size-6" alt="icon">
          </label>
        </div>
      </div>

      <!-- Product Price -->
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Product Price</p>
        <div class="flex flex-col gap-2 w-1/2">
          <label class="group relative">
            <div class="input-icon">
              <img src="../assets/images/icons/money-grey.svg" class="flex size-6 shrink-0" alt="icon">
            </div>
            <p class="input-placeholder">Enter Product Price</p>
            <input type="text" class="custom-input" placeholder="">
          </label>
        </div>
      </div>

      <!-- Product Stock -->
      <div class="flex items-center justify-between">
        <p class="font-semibold text-custom-grey">Product Stock</p>
        <div class="flex flex-col gap-2 w-1/2">
          <label class="group relative">
            <div class="input-icon">
              <img src="../assets/images/icons/box-grey.svg" class="flex size-6 shrink-0" alt="icon">
            </div>
            <p class="input-placeholder">Enter Product Stock</p>
            <input type="number" class="custom-input" placeholder="">
          </label>
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex items-center justify-end gap-4">
        <a href="product-list.html" class="flex items-center justify-center h-14 rounded-full py-4 px-6 gap-2 bg-custom-red text-white font-semibold text-lg">
          Cancel
        </a>
        <button type="submit" class="flex items-center justify-center h-14 rounded-full py-4 px-6 gap-2 bg-custom-blue text-white font-semibold text-lg">
          Create Now
        </button>
      </div>
    </form>

  </div>
  <script src="../admin-layout.js" defer></script>
</body>
</html>
