<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Manage Users - Kopmas Shop</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Lexend Deca', ui-sans-serif, system-ui; margin: 0; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .transition-300 { transition: all 300ms ease; }
    .bg-custom-background { background-color: #f3f5f9; }
    .bg-custom-blue { background-color: #1053d5; }
    .bg-custom-blue-10 { background-color: rgba(16, 83, 213, 0.1); }
    .bg-custom-black { background-color: #292d32; }
    .bg-custom-icon-background { background-color: #f3f3f3; }
    .bg-custom-stroke { background-color: #e8e8e8; }
    .text-custom-blue { color: #1053d5; }
    .text-custom-grey { color: #6a7686; }
    .text-custom-black { color: #292d32; }
    .border-custom-stroke { border-color: #e8e8e8; }
    .ring-custom-blue { --tw-ring-color: #1053d5; }
    .sidebar-item.active { background-color: rgba(16, 83, 213, 0.1); }
    .sidebar-item.active .sidebar-label { color: #1053d5; }
    .sidebar-item.active .icon-default { opacity: 0; }
    .sidebar-item.active .icon-active { opacity: 1; }
    .sidebar-item.active .active-bar { display: flex; }
    .branch-line { width: 2px; height: 100%; background-color: #e5e7eb; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 1px; }
    .branch-line:last-child { height: 55%; }
    .curve-branch { position: absolute; left: 0; top: 0; width: 28px; height: 32px; border-left: 2px solid #e5e7eb; border-bottom: 2px solid #e5e7eb; border-bottom-left-radius: 16px; background: transparent; z-index: 1; transform: translateX(-104%); }
    .panel-soft { border: 1px solid #e8e8e8; box-shadow: 0 8px 22px rgba(16, 83, 213, 0.05); }
    .table-row-hover:hover { background-color: rgba(16, 83, 213, 0.04); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lazysizes@5.3.2/lazysizes.min.js" async></script>
</head>
<body class="bg-custom-background text-custom-black">
  <div id="admin-app" data-page-title="Manage Users" data-role="admin">

    <section class="flex flex-col gap-5 rounded-[20px] bg-white p-5 panel-soft">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h2 class="font-bold text-xl">Manage Users</h2>
          <p class="text-sm text-custom-grey mt-1">Pantau akun buyer, seller, dan status verifikasi.</p>
        </div>
        <a href="user-list.html" class="flex h-11 items-center rounded-full bg-custom-blue px-5 font-semibold text-white hover:ring-2 ring-custom-blue transition-300">Open User List</a>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <article class="rounded-2xl border border-custom-stroke p-4 bg-custom-blue-10"><p class="text-sm text-custom-grey">Total Users</p><p class="mt-2 font-bold text-lg">4.280</p></article>
        <article class="rounded-2xl border border-custom-stroke p-4"><p class="text-sm text-custom-grey">New This Week</p><p class="mt-2 font-bold text-lg text-custom-blue">132</p></article>
        <article class="rounded-2xl border border-custom-stroke p-4"><p class="text-sm text-custom-grey">Need Verification</p><p class="mt-2 font-bold text-lg">24</p></article>
      </div>

      <div class="overflow-x-auto rounded-2xl border border-custom-stroke">
        <table class="w-full text-left">
          <thead><tr class="border-b border-custom-stroke bg-custom-background/70">
            <th class="py-3 px-4 font-semibold text-custom-grey">No</th>
            <th class="py-3 px-4 font-semibold text-custom-grey">Name</th>
            <th class="py-3 px-4 font-semibold text-custom-grey">Email</th>
            <th class="py-3 px-4 font-semibold text-custom-grey">Role</th>
            <th class="py-3 px-4 font-semibold text-custom-grey">Status</th>
          </tr></thead>
          <tbody>
            <tr class="border-b border-custom-stroke table-row-hover"><td class="py-3 px-4">1</td><td class="py-3 px-4 font-semibold">Budi Santoso</td><td class="py-3 px-4">budi@mail.com</td><td class="py-3 px-4"><span class="rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-700">Buyer</span></td><td class="py-3 px-4"><span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">Verified</span></td></tr>
            <tr class="table-row-hover"><td class="py-3 px-4">2</td><td class="py-3 px-4 font-semibold">Zakky Anur</td><td class="py-3 px-4">zakky@mail.com</td><td class="py-3 px-4"><span class="rounded-full bg-green-100 px-3 py-1 text-xs font-semibold text-green-700">Seller</span></td><td class="py-3 px-4"><span class="rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold text-amber-700">Pending</span></td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>
  <script src="../admin-layout.js" defer></script>
</body>
</html>
