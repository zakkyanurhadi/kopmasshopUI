<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kopmas Shop - Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', ui-sans-serif, system-ui; }
    #navbar-wrapper { background: rgba(255,255,255,.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.2); transition: all .3s ease; }
    #navbar-wrapper.scrolled { background: rgba(255,255,255,.85); box-shadow: 0 8px 32px rgba(0,0,0,.1); }
    .navbar-secondary { max-height: 50px; overflow: hidden; transition: max-height .35s ease, opacity .3s ease, margin .35s ease, padding .35s ease; opacity: 1; }
    .navbar-secondary.sec-hidden { max-height: 0; opacity: 0; padding-bottom: 0 !important; margin-bottom: -8px; }
  </style>
</head>
<body class="bg-slate-100 text-slate-900">
  <div data-shared-header></div>
  <div class="h-32 lg:h-40"></div>

  <main class="mx-auto w-full max-w-md px-3 pb-28">
    <section class="overflow-hidden rounded-3xl border border-slate-200 bg-slate-100 shadow-sm">
      <div class="relative bg-gradient-to-b from-sky-200 to-sky-100 px-4 pt-4 pb-14">
        <button type="button" onclick="history.back()" class="flex h-9 w-9 items-center justify-center rounded-full bg-white/70 text-slate-600">
          <i class="fas fa-arrow-left text-sm"></i>
        </button>
        <div class="pointer-events-none absolute right-3 top-3 text-sky-300/70">
          <i class="fas fa-shapes text-xl"></i>
        </div>
      </div>

      <div class="-mt-10 px-3 pb-4">
        <div class="rounded-2xl border border-slate-200 bg-white p-4 text-center shadow-sm">
          <div class="mx-auto -mt-10 flex h-20 w-20 items-center justify-center rounded-full border-4 border-white bg-sky-100 text-sky-500 shadow">
            <i class="fas fa-user text-2xl"></i>
          </div>
          <h1 class="mt-2 text-3xl font-extrabold text-[#2065fc]">Masuk</h1>
          <p class="mt-1 text-sm text-slate-500">Tidak punya akun? <a href="register.html" class="font-semibold text-[#2065fc]">Daftar</a></p>
        </div>
      </div>

      <div class="border-t border-slate-200 bg-white">
        <a href="#!" class="flex items-center justify-between px-4 py-4 text-[15px] text-slate-700 hover:bg-slate-50">
          <span class="flex items-center gap-3"><i class="fas fa-circle-question text-slate-400"></i> Bantuan KopmasCare</span>
          <i class="fas fa-chevron-right text-slate-400 text-xs"></i>
        </a>
        <a href="#!" class="flex items-center justify-between border-t border-slate-200 px-4 py-4 text-[15px] text-slate-700 hover:bg-slate-50">
          <span class="flex items-center gap-3"><i class="fas fa-store text-slate-400"></i> Jual di Kopmas</span>
          <i class="fas fa-chevron-right text-slate-400 text-xs"></i>
        </a>
      </div>

      <div class="px-4 py-8">
        <div class="mx-auto max-w-[210px] rounded-2xl border border-slate-200 bg-white px-4 py-5 text-center text-slate-500">
          <p class="text-sm font-semibold"><i class="fas fa-store mr-2 text-slate-400"></i>Tentang Kopmas</p>
          <hr class="my-3 border-slate-200">
          <p class="text-sm">All Rights Reserved</p>
        </div>
      </div>
    </section>
  </main>

  <script src="./layout-shared.js" defer></script>
</body>
</html>
