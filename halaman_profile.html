    <style>
      body {
        font-family: "Poppins", ui-sans-serif, system-ui;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar { display: none; }

      /* Profile card hover */
      .menu-row {
        transition: background 0.15s, transform 0.15s;
      }
      .menu-row:hover {
        background: rgba(32, 101, 252, 0.04);
        transform: translateX(3px);
      }
      .menu-row:active { opacity: 0.6; }

      [data-mobile-bottom-nav-wrapper] {
        background: linear-gradient(to top, rgba(248, 250, 252, 0.96), rgba(248, 250, 252, 0));
      }
      [data-mobile-bottom-nav] {
        background: rgba(255, 255, 255, 0.98) !important;
        border: 1px solid rgba(226, 232, 240, 0.95) !important;
        box-shadow: 0 -12px 34px rgba(15, 23, 42, 0.16) !important;
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }
      body.mobile-bottom-scrolled [data-mobile-bottom-nav] {
        background: rgba(255, 255, 255, 1) !important;
        box-shadow: 0 -16px 40px rgba(15, 23, 42, 0.2) !important;
      }
      .mobile-bottom-indicator {
        position: absolute;
        top: -10px;
        left: 50%;
        width: 30px;
        height: 3px;
        border-radius: 0 0 9999px 9999px;
        background: #2065fc;
        opacity: 0;
        transform: translateX(-50%) scaleX(0.2);
        transform-origin: center;
        transition: opacity 300ms ease, transform 520ms cubic-bezier(0.22, 0.61, 0.36, 1);
      }
      [data-mobile-bottom-link].is-active .mobile-bottom-indicator {
        opacity: 1;
        transform: translateX(-50%) scaleX(1);
        animation: activeBarPopSlow 560ms cubic-bezier(0.22, 0.61, 0.36, 1);
      }
      @keyframes activeBarPopSlow {
        0% {
          transform: translateX(-50%) scaleX(0.2);
        }
        65% {
          transform: translateX(-50%) scaleX(1.12);
        }
        100% {
          transform: translateX(-50%) scaleX(1);
        }
      }

      .top-appbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 80;
        background: #e5e7eb;
        border-bottom: 1px solid #d1d5db;
      }
      .top-appbar-inner {
        max-width: 672px;
        margin: 0 auto;
        min-height: 58px;
        padding: 0 14px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .top-back-link {
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #334155;
      }
      .top-back-link:hover {
        background: rgba(148, 163, 184, 0.18);
      }

      .page-enter {
        animation: pageEnterMobile 280ms cubic-bezier(0.22, 0.61, 0.36, 1);
      }
      .page-leave {
        animation: pageLeaveMobile 220ms cubic-bezier(0.4, 0, 1, 1) forwards;
      }
      @keyframes pageEnterMobile {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pageLeaveMobile {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(-20px);
        }
      }

      :root {
        /* Ubah nilai ini untuk atur padding kanan-kiri secara manual */
        --page-side-padding-mobile-min: 20px;
        --page-side-padding-fluid: 5vw;
        --page-side-padding-desktop: 160px;
      }

      body .px-55 {
        padding-left: clamp(
          var(--page-side-padding-mobile-min),
          var(--page-side-padding-fluid),
          var(--page-side-padding-desktop)
        ) !important;
        padding-right: clamp(
          var(--page-side-padding-mobile-min),
          var(--page-side-padding-fluid),
          var(--page-side-padding-desktop)
        ) !important;
      }

      @media (min-width: 1280px) {
        body .px-55 {
          padding-left: var(--page-side-padding-desktop) !important;
          padding-right: var(--page-side-padding-desktop) !important;
        }
      }
    </style>

    <script>
      const currentPage = (window.location.pathname.split("/").pop() || "index.html").toLowerCase();
      const mobileBottomLinks = document.querySelectorAll("[data-mobile-bottom-link]");
      const topBackLink = document.getElementById("top-back-link");

      const bindPageTransition = (link) => {
        link?.addEventListener("click", (event) => {
          const targetHref = link.getAttribute("href");
          if (!targetHref || targetHref.toLowerCase() === currentPage) {
            event.preventDefault();
            return;
          }

          event.preventDefault();
          document.body.classList.add("page-leave");
          setTimeout(() => {
            window.location.href = targetHref;
          }, 210);
        });
      };

      mobileBottomLinks.forEach((link) => {
        const routeTokens = (link.dataset.routes || "").split(",").map((r) => r.trim().toLowerCase()).filter(Boolean);
        const isActive = routeTokens.includes(currentPage);
        const icon = link.querySelector("[data-mobile-bottom-icon]");
        const label = link.querySelector("[data-mobile-bottom-label]");
        let indicator = link.querySelector("[data-mobile-bottom-indicator]");
        if (!indicator) {
          indicator = document.createElement("span");
          indicator.dataset.mobileBottomIndicator = "";
          indicator.className = "mobile-bottom-indicator";
          link.prepend(indicator);
        }
        link.classList.add("relative");
        link.classList.toggle("is-active", isActive);
        link.style.color = isActive ? "#2065fc" : "#64748b";
        if (label) label.style.fontWeight = isActive ? "700" : "500";
        if (icon) {
          icon.style.background = isActive ? "rgba(32,101,252,0.14)" : "transparent";
          icon.style.boxShadow = isActive ? "0 10px 18px rgba(32,101,252,0.18)" : "none";
        }

        bindPageTransition(link);
      });
      bindPageTransition(topBackLink);

      const syncMobileBottomPadding = () => {
        document.body.style.paddingBottom = "calc(96px + env(safe-area-inset-bottom))";
      };
      syncMobileBottomPadding();
      window.addEventListener("resize", syncMobileBottomPadding);

      window.addEventListener("scroll", () => {
        document.body.classList.toggle("mobile-bottom-scrolled", window.scrollY > 6);
      });

      window.addEventListener("pageshow", () => {
        document.body.classList.remove("page-leave");
      });
      requestAnimationFrame(() => {
        document.body.classList.add("page-enter");
        setTimeout(() => document.body.classList.remove("page-enter"), 300);
      });
    </script>
