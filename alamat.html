<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kopmas Shop - Alamat Pembeli</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', ui-sans-serif, system-ui; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto w-full max-w-3xl px-4 py-6 md:px-6 md:py-10">
    <div class="mb-5 flex items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <a href="halaman_checkout.html" class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-100">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        <div>
          <p class="text-xs font-semibold text-blue-600">Checkout</p>
          <h1 class="text-xl font-extrabold md:text-2xl">Tambah Alamat Pembeli</h1>
        </div>
      </div>
    </div>

    <section class="rounded-2xl border border-slate-200 bg-white p-5 md:p-6">
      <h2 class="text-base font-bold">Data Penerima</h2>

      <div class="mt-4 grid gap-4 md:grid-cols-2">
        <label>
          <span class="mb-1 block text-xs font-semibold text-slate-500">Nama Lengkap</span>
          <input id="nameInput" type="text" placeholder="Nama penerima" class="h-11 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500">
        </label>
        <label>
          <span class="mb-1 block text-xs font-semibold text-slate-500">Nomor Telepon</span>
          <input id="phoneInput" type="text" placeholder="08xxxxxxxxxx" class="h-11 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500">
        </label>
      </div>

      <div class="mt-5 rounded-xl border border-slate-200 p-4 md:p-5 space-y-4">
        <p class="text-sm font-bold text-slate-800">Lokasi Tujuan</p>
        <label class="block">
          <span class="mb-1 block text-xs font-semibold text-slate-500">Provinsi</span>
          <select id="provinceSelect" class="h-11 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500">
            <option value="">Pilih provinsi</option>
          </select>
        </label>
        <label class="block">
          <span class="mb-1 block text-xs font-semibold text-slate-500">Kota / Kabupaten</span>
          <select id="citySelect" class="h-11 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500" disabled>
            <option value="">Pilih kota / kabupaten</option>
          </select>
        </label>
        <label class="block">
          <span class="mb-1 block text-xs font-semibold text-slate-500">Kapanewon</span>
          <select id="districtSelect" class="h-11 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500" disabled>
            <option value="">Pilih kapanewon</option>
          </select>
        </label>
        <label class="block">
          <span class="mb-1 block text-xs font-semibold text-slate-500">Kalurahan</span>
          <select id="villageSelect" class="h-11 w-full rounded-xl border border-slate-200 px-4 text-sm outline-none focus:border-blue-500" disabled>
            <option value="">Pilih kalurahan</option>
          </select>
        </label>
      </div>

      <div class="mt-5 grid gap-4">
        <label>
          <span class="mb-1 block text-xs font-semibold text-slate-500">Alamat Jalan, Gedung, Nomor Rumah</span>
          <textarea id="streetInput" placeholder="Contoh: Gang Nakulo, Modinan, Banyuraden" class="min-h-24 w-full rounded-xl border border-slate-200 p-4 text-sm outline-none focus:border-blue-500"></textarea>
        </label>
        <label>
          <span class="mb-1 block text-xs font-semibold text-slate-500">Detail Lainnya (Patokan, Blok, Unit)</span>
          <textarea id="detailInput" placeholder="Contoh: Kontrakan warna ungu" class="min-h-20 w-full rounded-xl border border-slate-200 p-4 text-sm outline-none focus:border-blue-500"></textarea>
        </label>
      </div>

      <p id="feedbackText" class="mt-4 hidden text-xs font-semibold"></p>

      <div class="mt-5 flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
        <a href="halaman_checkout.html" class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-300 px-5 text-sm font-semibold text-slate-700 hover:bg-slate-100">Batal</a>
        <button id="btnOpenSaveModal" type="button" class="inline-flex h-11 items-center justify-center rounded-xl bg-blue-600 px-5 text-sm font-bold text-white hover:bg-blue-700 transition">Simpan Alamat</button>
      </div>
    </section>
  </main>

  <div id="saveModal" class="pointer-events-none fixed inset-0 z-50 opacity-0 transition">
    <div class="absolute inset-0 bg-slate-900/40"></div>
    <div class="relative mx-auto mt-24 w-[92%] max-w-md rounded-2xl bg-white p-5 shadow-xl">
      <h3 class="text-base font-bold text-slate-900">Simpan alamat ini?</h3>
      <p class="mt-1 text-xs text-slate-500">Pastikan data penerima dan lokasi sudah benar.</p>
      <div class="mt-4 rounded-xl border border-slate-200 bg-slate-50 p-3 text-sm">
        <p id="previewName" class="font-semibold text-slate-900">-</p>
        <p id="previewPhone" class="mt-1 text-slate-700">-</p>
        <p id="previewLocation" class="mt-2 text-xs font-semibold text-blue-700">-</p>
        <p id="previewAddress" class="mt-1 text-slate-700">-</p>
      </div>
      <div class="mt-5 grid grid-cols-2 gap-2">
        <button id="btnCloseSaveModal" type="button" class="h-11 rounded-xl border border-slate-300 text-sm font-semibold text-slate-700 hover:bg-slate-100">Batal</button>
        <button id="btnConfirmSave" type="button" class="h-11 rounded-xl bg-blue-600 text-sm font-bold text-white hover:bg-blue-700">Ya, Simpan</button>
      </div>
    </div>
  </div>

  <script>
    const REGION_BASE_URL = "https://www.emsifa.com/api-wilayah-indonesia/api";

    const nameInput = document.getElementById("nameInput");
    const phoneInput = document.getElementById("phoneInput");
    const provinceSelect = document.getElementById("provinceSelect");
    const citySelect = document.getElementById("citySelect");
    const districtSelect = document.getElementById("districtSelect");
    const villageSelect = document.getElementById("villageSelect");
    const streetInput = document.getElementById("streetInput");
    const detailInput = document.getElementById("detailInput");
    const feedbackText = document.getElementById("feedbackText");

    const saveModal = document.getElementById("saveModal");
    const previewName = document.getElementById("previewName");
    const previewPhone = document.getElementById("previewPhone");
    const previewLocation = document.getElementById("previewLocation");
    const previewAddress = document.getElementById("previewAddress");

    function showFeedback(message, type) {
      feedbackText.classList.remove("hidden", "text-red-600", "text-emerald-600", "text-slate-500");
      if (type === "error") feedbackText.classList.add("text-red-600");
      else if (type === "success") feedbackText.classList.add("text-emerald-600");
      else feedbackText.classList.add("text-slate-500");
      feedbackText.textContent = message;
    }

    function fillSelect(selectEl, items, placeholder) {
      selectEl.innerHTML = `<option value="">${placeholder}</option>`;
      items.forEach((item) => {
        const option = document.createElement("option");
        option.value = item.id;
        option.textContent = item.name;
        selectEl.appendChild(option);
      });
    }

    function resetSelect(selectEl, placeholder) {
      selectEl.innerHTML = `<option value="">${placeholder}</option>`;
      selectEl.disabled = true;
    }

    async function fetchRegion(endpoint) {
      const response = await fetch(`${REGION_BASE_URL}/${endpoint}`);
      if (!response.ok) {
        throw new Error("Gagal mengambil data wilayah");
      }
      return response.json();
    }

    async function loadProvinces() {
      try {
        const provinces = await fetchRegion("provinces.json");
        fillSelect(provinceSelect, provinces, "Pilih provinsi");
      } catch (error) {
        showFeedback("Gagal memuat daftar provinsi. Coba refresh halaman.", "error");
      }
    }

    async function onProvinceChange() {
      const provinceId = provinceSelect.value;

      resetSelect(citySelect, "Pilih kota / kabupaten");
      resetSelect(districtSelect, "Pilih kapanewon");
      resetSelect(villageSelect, "Pilih kalurahan");

      if (!provinceId) {
        return;
      }

      try {
        const cities = await fetchRegion(`regencies/${provinceId}.json`);
        fillSelect(citySelect, cities, "Pilih kota / kabupaten");
        citySelect.disabled = false;
      } catch (error) {
        showFeedback("Gagal memuat kota / kabupaten.", "error");
      }
    }

    async function onCityChange() {
      const cityId = citySelect.value;

      resetSelect(districtSelect, "Pilih kapanewon");
      resetSelect(villageSelect, "Pilih kalurahan");

      if (!cityId) {
        return;
      }

      try {
        const districts = await fetchRegion(`districts/${cityId}.json`);
        fillSelect(districtSelect, districts, "Pilih kapanewon");
        districtSelect.disabled = false;
      } catch (error) {
        showFeedback("Gagal memuat kapanewon.", "error");
      }
    }

    async function onDistrictChange() {
      const districtId = districtSelect.value;

      resetSelect(villageSelect, "Pilih kalurahan");

      if (!districtId) {
        return;
      }

      try {
        const villages = await fetchRegion(`villages/${districtId}.json`);
        fillSelect(villageSelect, villages, "Pilih kalurahan");
        villageSelect.disabled = false;
      } catch (error) {
        showFeedback("Gagal memuat kalurahan.", "error");
      }
    }

    function selectedText(selectEl) {
      return selectEl.options[selectEl.selectedIndex]?.textContent || "";
    }

    function getAddressDraft() {
      const name = nameInput.value.trim();
      const phone = phoneInput.value.trim();
      const street = streetInput.value.trim();
      const detail = detailInput.value.trim();

      const provinceId = provinceSelect.value;
      const cityId = citySelect.value;
      const districtId = districtSelect.value;
      const villageId = villageSelect.value;

      const provinceName = selectedText(provinceSelect);
      const cityName = selectedText(citySelect);
      const districtName = selectedText(districtSelect);
      const villageName = selectedText(villageSelect);

      const locationLabel = [villageName, districtName, cityName, provinceName].filter(Boolean).join(", ");
      const destinationQuery = [districtName, cityName, provinceName].filter(Boolean).join(" ");
      const fullAddress = detail ? `${street}, ${detail}` : street;

      return {
        name,
        phone,
        provinceId,
        provinceName,
        cityId,
        cityName,
        districtId,
        districtName,
        villageId,
        villageName,
        destinationId: "",
        destinationSource: "hierarchy",
        destinationQuery,
        locationLabel,
        fullAddress
      };
    }

    function validateAddress(address) {
      if (!address.name) return "Nama penerima wajib diisi.";
      if (!address.phone) return "Nomor telepon wajib diisi.";
      if (!address.provinceId) return "Pilih provinsi terlebih dahulu.";
      if (!address.cityId) return "Pilih kota / kabupaten terlebih dahulu.";
      if (!address.districtId) return "Pilih kapanewon terlebih dahulu.";
      if (!address.villageId) return "Pilih kalurahan terlebih dahulu.";
      if (!address.fullAddress) return "Alamat lengkap wajib diisi.";
      return "";
    }

    function openSaveModal() {
      const draft = getAddressDraft();
      const validationError = validateAddress(draft);
      if (validationError) {
        showFeedback(validationError, "error");
        return;
      }

      previewName.textContent = draft.name;
      previewPhone.textContent = draft.phone;
      previewLocation.textContent = draft.locationLabel;
      previewAddress.textContent = draft.fullAddress;

      saveModal.classList.remove("pointer-events-none", "opacity-0");
    }

    function closeSaveModal() {
      saveModal.classList.add("pointer-events-none", "opacity-0");
    }

    function saveAddress() {
      const draft = getAddressDraft();
      const validationError = validateAddress(draft);
      if (validationError) {
        closeSaveModal();
        showFeedback(validationError, "error");
        return;
      }

      localStorage.setItem("checkoutBuyerAddress", JSON.stringify(draft));
      window.location.href = "halaman_checkout.html?address_saved=1";
    }

    async function setSelectValueFromSaved(selectEl, value, loaderFn) {
      if (!value) return;
      selectEl.value = value;
      if (loaderFn) {
        await loaderFn();
      }
    }

    async function hydrateFromSavedAddress() {
      try {
        const raw = localStorage.getItem("checkoutBuyerAddress");
        if (!raw) return;
        const address = JSON.parse(raw);

        nameInput.value = address?.name || "";
        phoneInput.value = address?.phone || "";
        streetInput.value = address?.fullAddress || "";

        await setSelectValueFromSaved(provinceSelect, address?.provinceId, onProvinceChange);
        await setSelectValueFromSaved(citySelect, address?.cityId, onCityChange);
        await setSelectValueFromSaved(districtSelect, address?.districtId, onDistrictChange);
        await setSelectValueFromSaved(villageSelect, address?.villageId);
      } catch (error) {
        // Ignore invalid localStorage data
      }
    }

    provinceSelect.addEventListener("change", onProvinceChange);
    citySelect.addEventListener("change", onCityChange);
    districtSelect.addEventListener("change", onDistrictChange);
    document.getElementById("btnOpenSaveModal").addEventListener("click", openSaveModal);
    document.getElementById("btnCloseSaveModal").addEventListener("click", closeSaveModal);
    document.getElementById("btnConfirmSave").addEventListener("click", saveAddress);

    saveModal.addEventListener("click", (event) => {
      if (event.target === saveModal || event.target.classList.contains("bg-slate-900/40")) {
        closeSaveModal();
      }
    });

    loadProvinces().then(hydrateFromSavedAddress);
  </script>
</body>
</html>
